<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Роберт Рождественский — сайт</title>
    <style>
        /* Минимальные стили для страницы с фреймами */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        .frame-top {
            width: 100%;
            height: 80px;
            border: none;
            overflow: hidden;
        }
        .frame-content {
            width: 100%;
            height: calc(100% - 80px);
            border: none;
        }
    </style>
</head>
<body>

    <!-- Верхний фрейм: навигационная панель -->
    <iframe src="topbar.html" class="frame-top" title="Навигация"></iframe>

    <!-- Нижний фрейм: основное содержимое -->
    <iframe src="content.html" class="frame-content" name="contentFrame" title="Основной контент"></iframe>

</body>
</html>
