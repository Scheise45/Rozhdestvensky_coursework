<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Роберт Рождественский — сайт</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;

            display: flex;
            flex-direction: column;

            font-family: system-ui, 'Segoe UI', sans-serif;
        }

        .frame-top {
            width: 100%;
            height: 80px;
            border: none;
            flex-shrink: 0;
        }

        .frame-content {
            width: 100%;
            flex: 1;
            border: none;
        }

        .frame-footer {
            width: 100%;
            height: 90px;
            border: none;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <iframe src="topbar.html"
            class="frame-top"
            title="Навигация"></iframe>

    <iframe src="content.html"
            class="frame-content"
            name="contentFrame"
            title="Основной контент"></iframe>

    <iframe src="footer.html"
            class="frame-footer"
            title="Подвал сайта"></iframe>

</body>
</html>
